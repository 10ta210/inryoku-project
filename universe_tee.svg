<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <linearGradient id="tshirt-grad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <radialGradient id="universe-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#222" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="1"/>
    </radialGradient>
    <filter id="particle-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="480" fill="#000"/>

  <!-- T-shirt shape -->
  <g filter="url(#shadow2)">
    <path d="M 90,80 L 50,110 L 30,170 L 70,180 L 90,130 L 90,380 C 90,400 100,410 120,410 L 280,410 C 300,410 310,400 310,380 L 310,130 L 330,180 L 370,170 L 350,110 L 310,80 C 290,65 260,55 240,55 C 225,70 210,78 200,78 C 190,78 175,70 160,55 C 140,55 110,65 90,80 Z"
          fill="url(#tshirt-grad2)" stroke="#222" stroke-width="1"/>
  </g>

  <!-- Collar -->
  <ellipse cx="200" cy="72" rx="35" ry="12" fill="none" stroke="#222" stroke-width="1.5"/>

  <!-- Universe design area -->
  <clipPath id="design-clip">
    <rect x="120" y="110" width="160" height="180" rx="8"/>
  </clipPath>

  <g clip-path="url(#design-clip)">
    <rect x="120" y="110" width="160" height="180" fill="url(#universe-glow)"/>

    <!-- Constellation lines -->
    <line x1="145" y1="140" x2="180" y2="165" stroke="#1a1a2e" stroke-width="0.5"/>
    <line x1="180" y1="165" x2="220" y2="150" stroke="#1a1a2e" stroke-width="0.5"/>
    <line x1="220" y1="150" x2="250" y2="200" stroke="#1a1a2e" stroke-width="0.5"/>
    <line x1="160" y1="220" x2="200" y2="240" stroke="#1a1a2e" stroke-width="0.5"/>
    <line x1="200" y1="240" x2="240" y2="225" stroke="#1a1a2e" stroke-width="0.5"/>

    <!-- Particles - Cyan -->
    <circle cx="145" cy="140" r="4" fill="#00FFFF" filter="url(#particle-glow)" opacity="0.9"/>
    <circle cx="230" cy="250" r="2.5" fill="#00FFFF" filter="url(#particle-glow)" opacity="0.7"/>
    <circle cx="170" cy="270" r="1.5" fill="#00FFFF" opacity="0.5"/>

    <!-- Particles - Magenta -->
    <circle cx="250" cy="200" r="5" fill="#FF00FF" filter="url(#particle-glow)" opacity="0.9"/>
    <circle cx="140" cy="230" r="2" fill="#FF00FF" filter="url(#particle-glow)" opacity="0.6"/>
    <circle cx="260" cy="145" r="1.5" fill="#FF00FF" opacity="0.5"/>

    <!-- Particles - Yellow -->
    <circle cx="200" cy="180" r="3" fill="#FFFF00" filter="url(#particle-glow)" opacity="0.8"/>
    <circle cx="160" cy="160" r="1.5" fill="#FFFF00" opacity="0.6"/>

    <!-- Particles - Red -->
    <circle cx="180" cy="165" r="3.5" fill="#FF0000" filter="url(#particle-glow)" opacity="0.85"/>
    <circle cx="245" cy="270" r="2" fill="#FF0000" opacity="0.6"/>

    <!-- Particles - Green -->
    <circle cx="220" cy="150" r="3" fill="#00FF00" filter="url(#particle-glow)" opacity="0.8"/>
    <circle cx="155" cy="250" r="2.5" fill="#00FF00" filter="url(#particle-glow)" opacity="0.7"/>

    <!-- Particles - Blue -->
    <circle cx="160" cy="220" r="4" fill="#0000FF" filter="url(#particle-glow)" opacity="0.85"/>
    <circle cx="265" cy="180" r="2" fill="#0000FF" opacity="0.6"/>

    <!-- Particles - White (stars) -->
    <circle cx="200" cy="240" r="3.5" fill="#FFFFFF" filter="url(#particle-glow)" opacity="0.9"/>
    <circle cx="240" cy="225" r="2" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="135" cy="175" r="1" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="270" cy="160" r="1" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="195" cy="130" r="1" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="230" cy="275" r="1" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="150" cy="195" r="0.8" fill="#FFFFFF" opacity="0.3"/>
    <circle cx="210" cy="210" r="0.8" fill="#FFFFFF" opacity="0.3"/>
    <circle cx="175" cy="280" r="0.8" fill="#FFFFFF" opacity="0.3"/>
    <circle cx="255" cy="235" r="0.8" fill="#FFFFFF" opacity="0.3"/>

    <!-- Grey sphere (50%) -->
    <circle cx="200" cy="200" r="8" fill="#808080" filter="url(#particle-glow)" opacity="0.6"/>
    <circle cx="200" cy="200" r="4" fill="#aaa" opacity="0.4"/>
  </g>

  <!-- "101%" text -->
  <text x="200" y="310" text-anchor="middle" font-family="monospace" font-size="8" fill="#333" letter-spacing="3">YOUR UNIVERSE</text>

  <!-- Price tag -->
  <text x="200" y="450" text-anchor="middle" font-family="monospace" font-size="14" fill="#808080" font-weight="bold">¥5,500</text>
  <text x="200" y="468" text-anchor="middle" font-family="monospace" font-size="9" fill="#444">ONE OF ONE</text>
</svg>