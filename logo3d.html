<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>inryokü — 3D logo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;background:#050507;color:#eee;overflow:hidden;font-family:'IBM Plex Mono',ui-monospace,monospace}
canvas{display:block}
#stage{position:fixed;inset:0;z-index:1}
.overlay{position:fixed;inset:0;z-index:2;pointer-events:none;display:flex;align-items:center;justify-content:center}
.title{
  pointer-events:none;
  font-size:10px;letter-spacing:0.4em;text-transform:uppercase;
  color:rgba(255,255,255,0.3);
  position:absolute;top:32px;left:32px;
}
.meta{
  position:absolute;bottom:32px;right:32px;
  font-size:9px;letter-spacing:0.3em;text-transform:uppercase;
  color:rgba(255,255,255,0.3);line-height:2;text-align:right;
}
.meta b{color:#fff;font-weight:400}
.hint{
  position:absolute;bottom:32px;left:32px;
  font-size:9px;letter-spacing:0.3em;text-transform:uppercase;
  color:rgba(255,255,255,0.3);
}
.hint .blink{animation:blink 1.4s steps(2,end) infinite}
@keyframes blink{50%{opacity:0}}
.scan{
  position:fixed;inset:0;z-index:3;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0.25) 0,rgba(0,0,0,0.25) 1px,transparent 1px,transparent 3px);
  mix-blend-mode:multiply;
}
.vignette{
  position:fixed;inset:0;z-index:4;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,0.75) 100%);
}
</style>
</head>
<body>

<div id="stage"></div>

<div class="overlay">
  <div class="title">inryokü · 3D · LOGO.BLEND → GLTF</div>
  <div class="hint">drag to observe <span class="blink">_</span></div>
  <div class="meta">
    <div>format · <b>GLB</b></div>
    <div>vertices · <b>~20k</b></div>
    <div>size · <b>856 KB</b></div>
    <div><b>50% → 101%</b></div>
  </div>
</div>

<div class="scan"></div>
<div class="vignette"></div>

<!-- ES module imports -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

const stage = document.getElementById('stage');

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 0.3, 5);

// RGBCMY rim lighting
const lights = [
  { color: 0xff2148, pos: [ 3,  2,  3] },  // R
  { color: 0x2fe56a, pos: [-3,  2,  3] },  // G
  { color: 0x4263f5, pos: [ 0, -2,  3] },  // B
  { color: 0x2ee2e2, pos: [ 3, -2, -2] },  // C
  { color: 0xe23bc8, pos: [-3, -2, -2] },  // M
  { color: 0xf6d52e, pos: [ 0,  3, -2] },  // Y
];
lights.forEach(l => {
  const pl = new THREE.PointLight(l.color, 2.8, 15, 2);
  pl.position.set(...l.pos);
  scene.add(pl);
});
// ambient very dim
scene.add(new THREE.AmbientLight(0xffffff, 0.15));

// particle field
const starCount = 1500;
const stars = new THREE.BufferGeometry();
const pos = new Float32Array(starCount * 3);
const col = new Float32Array(starCount * 3);
const palette = [
  [1, 0.13, 0.28], [0.18, 0.9, 0.42], [0.26, 0.39, 0.96],
  [0.18, 0.89, 0.89], [0.89, 0.23, 0.78], [0.97, 0.84, 0.18],
  [0.5, 0.5, 0.5]
];
for (let i = 0; i < starCount; i++) {
  const r = 6 + Math.random() * 20;
  const t = Math.random() * Math.PI * 2;
  const p = Math.acos(2 * Math.random() - 1);
  pos[i*3]   = r * Math.sin(p) * Math.cos(t);
  pos[i*3+1] = r * Math.sin(p) * Math.sin(t);
  pos[i*3+2] = r * Math.cos(p);
  const c = palette[Math.floor(Math.random() * palette.length)];
  col[i*3] = c[0]; col[i*3+1] = c[1]; col[i*3+2] = c[2];
}
stars.setAttribute('position', new THREE.BufferAttribute(pos, 3));
stars.setAttribute('color', new THREE.BufferAttribute(col, 3));
const starMat = new THREE.PointsMaterial({
  size: 0.05, vertexColors: true, transparent: true, opacity: 0.9,
  blending: THREE.AdditiveBlending, sizeAttenuation: true
});
const starField = new THREE.Points(stars, starMat);
scene.add(starField);

// controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.enablePan = false;
controls.minDistance = 2;
controls.maxDistance = 10;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.6;

// load GLB
const loader = new GLTFLoader();
let logo = null;
loader.load('public/inryoku_logo_3d.glb', gltf => {
  logo = gltf.scene;
  // center & scale
  const bbox = new THREE.Box3().setFromObject(logo);
  const center = bbox.getCenter(new THREE.Vector3());
  const size = bbox.getSize(new THREE.Vector3()).length();
  logo.position.sub(center);
  baseScale = 3.2 / size;
  logo.scale.setScalar(baseScale);
  // pump up material
  logo.traverse(o => {
    if (!o.isMesh || !o.material) return;
    const name = o.name.toLowerCase();
    const mat = o.material;
    // BodyPin ("i" 本体) — 前面、solid、強い金属感
    if (name.includes('body') || name.includes('pin')) {
      mat.metalness = 0.85;
      mat.roughness = 0.18;
      mat.envMapIntensity = 1.6;
      mat.color.setHex(0xe8eaee);
      o.renderOrder = 2;
    }
    // EggShell — ghost 化、透過、控えめ
    else if (name.includes('egg') || name.includes('shell')) {
      mat.transparent = true;
      mat.opacity = 0.28;
      mat.metalness = 0.35;
      mat.roughness = 0.45;
      mat.envMapIntensity = 1.0;
      mat.depthWrite = false;
      o.renderOrder = 1;
    }
    // RainbowSphere — 発光させる
    else if (name.includes('rainbow') || name.includes('sphere')) {
      mat.metalness = 0.15;
      mat.roughness = 0.1;
      mat.envMapIntensity = 2.0;
      if (mat.emissive) mat.emissive.setHex(0x333333);
      o.renderOrder = 3;
    }
    else {
      mat.metalness = 0.55;
      mat.roughness = 0.25;
      mat.envMapIntensity = 1.2;
    }
  });
  scene.add(logo);
}, undefined, e => console.error('GLB load error:', e));

// env map (simple room)
const pmrem = new THREE.PMREMGenerator(renderer);
const envScene = new THREE.Scene();
envScene.background = new THREE.Color(0x070709);
// ambient colored spheres
[[0xff2148, 5, 2, 0], [0x2fe56a, -5, 2, 0], [0x4263f5, 0, -5, 0]].forEach(([c, x, y, z]) => {
  const l = new THREE.PointLight(c, 3, 20, 2);
  l.position.set(x, y, z);
  envScene.add(l);
});
const envTex = pmrem.fromScene(envScene, 0.04).texture;
scene.environment = envTex;

// resize
addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});

// animate
const clock = new THREE.Clock();
let baseScale = 1;
function tick() {
  const t = clock.getElapsedTime();
  if (logo) {
    const b = 1 + Math.sin(t * 0.8) * 0.02;
    logo.scale.setScalar(baseScale * b);
  }
  starField.rotation.y = t * 0.012;
  starField.rotation.x = Math.sin(t * 0.1) * 0.08;
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
