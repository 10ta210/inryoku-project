<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>inryokü — P3 Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">

  <!-- Three.js 0.160.0 UMD -->

  <!-- 2026-04-17: 0.160 では examples/js/ が廃止され404で 5秒近く遅延するため削除
       Bloom効果はシェーダー内で補償済み -->

  <script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>

  <script src="https://unpkg.com/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>

  <link rel="stylesheet" href="p3_styles.css?v=20260419r2">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', Arial, sans-serif; }
    #root { width: 100%; height: 100%; position: relative; z-index: 1; }
    /* テスト用バッジ */
    #test-badge {
      position: fixed; top: 10px; right: 12px; z-index: 9999;
      font-size: 10px; color: #0f0; opacity: 0.4;
      pointer-events: none; letter-spacing: 2px; font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="test-badge">P3 TEST</div>

  <script>
    // 2026-04-19: P3単体テスト時は初期ミュートを OFF にして BGM が聞こえるように
    window._inryokuMuted = false;
  </script>
  <script src="p3_code_for_claude.js?v=20260419r2"></script>
  <script>
    // P3 直接起動 (P1/P2をスキップ)
    renderPhase3();
    // 初回クリック/タッチで BGM 再生再開（ブラウザの自動再生ポリシー対策）
    (function(){
      function kick(){
        if (window._p6bgm) {
          window._p6bgm.muted = !!window._inryokuMuted;
          var pr = window._p6bgm.play();
          if (pr && pr.catch) pr.catch(function(){});
        }
        document.removeEventListener('click', kick);
        document.removeEventListener('touchstart', kick);
        document.removeEventListener('keydown', kick);
      }
      document.addEventListener('click', kick, { once: true });
      document.addEventListener('touchstart', kick, { once: true });
      document.addEventListener('keydown', kick, { once: true });
    })();
  </script>
</body>
</html>
