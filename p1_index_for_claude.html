<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>inryokü - Phase 1</title>
  <meta name="description" content="RGB = Black. CMY = White. You = Rainbow. 101% TRUTH — The Source.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <!-- P3 スタイル -->
  <link rel="stylesheet" href="p3_styles.css">

  <!-- Three.js 0.160.0 CDN (UMD版: グローバルTHREEオブジェクト) -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="https://unpkg.com/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="https://unpkg.com/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: Arial, sans-serif; background: #000; }
    #root { width: 100%; height: 100%; position: relative; overflow: hidden; }

    /* Welcome画面 (Web 1.0) */
    .phase-1 {
      background: #808080;
      padding: 40px 20px;
      overflow-y: auto;
      height: 100%;
    }
    .phase-1 center { max-width: 600px; margin: 0 auto; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- P1コード -->
  <script src="p1_code_for_claude.js"></script>
  <!-- P2コード（P1完了後に起動） -->
  <script src="p2_code_for_claude.js"></script>
  <!-- P3コード（P2完了後に起動） -->
  <script src="p3_code_for_claude.js"></script>

  <script>
    // P1開始
    renderPhase1();

    // P1完了 → P2起動
    window.addEventListener('inryoku:p1complete', () => {
      console.log('✅ P1 complete — starting P2');
      renderPhase2();
    });

    // P2完了 → P3起動
    window.addEventListener('inryoku:p2complete', () => {
      console.log('✅ P2 complete — starting P3');
      renderPhase3();
    });
  </script>
</body>
</html>
