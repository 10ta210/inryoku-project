<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>inryokü — P2 Test</title>

  <!-- Three.js 0.160.0 CDN (UMD) -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="https://unpkg.com/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="https://unpkg.com/three@0.160.0/examples/js/shaders/CopyShader.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
    }
    #root { width: 100%; height: 100%; }

    /* テスト用バッジ */
    #test-badge {
      position: fixed;
      top: 10px;
      right: 12px;
      z-index: 9999;
      font-size: 10px;
      color: #0f0;
      opacity: 0.45;
      pointer-events: none;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="test-badge">P2 TEST</div>

  <script src="p2_code_for_claude.js"></script>

  <script>
    // P2 直接起動 (P1/BSODをスキップ)
    renderPhase2();

    window.addEventListener('inryoku:p2complete', () => {
      console.log('✅ P2 complete — P3 transition would fire here');
    });
  </script>
</body>
</html>
