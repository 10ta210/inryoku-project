<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <linearGradient id="tshirt-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="480" fill="#000"/>

  <!-- T-shirt shape -->
  <g filter="url(#shadow)">
    <path d="M 90,80 L 50,110 L 30,170 L 70,180 L 90,130 L 90,380 C 90,400 100,410 120,410 L 280,410 C 300,410 310,400 310,380 L 310,130 L 330,180 L 370,170 L 350,110 L 310,80 C 290,65 260,55 240,55 C 225,70 210,78 200,78 C 190,78 175,70 160,55 C 140,55 110,65 90,80 Z"
          fill="url(#tshirt-grad)" stroke="#222" stroke-width="1"/>
  </g>

  <!-- Collar -->
  <ellipse cx="200" cy="72" rx="35" ry="12" fill="none" stroke="#222" stroke-width="1.5"/>

  <!-- QR Code design on shirt -->
  <g transform="translate(145, 140)">
    <!-- QR code pattern (simplified) -->
    <rect x="0" y="0" width="110" height="110" fill="#111" rx="4"/>

    <!-- QR corners -->
    <rect x="8" y="8" width="28" height="28" fill="none" stroke="#808080" stroke-width="3" rx="2"/>
    <rect x="14" y="14" width="16" height="16" fill="#808080" rx="1"/>

    <rect x="74" y="8" width="28" height="28" fill="none" stroke="#808080" stroke-width="3" rx="2"/>
    <rect x="80" y="14" width="16" height="16" fill="#808080" rx="1"/>

    <rect x="8" y="74" width="28" height="28" fill="none" stroke="#808080" stroke-width="3" rx="2"/>
    <rect x="14" y="80" width="16" height="16" fill="#808080" rx="1"/>

    <!-- QR data dots -->
    <rect x="44" y="10" width="6" height="6" fill="#666" rx="1"/>
    <rect x="54" y="10" width="6" height="6" fill="#555" rx="1"/>
    <rect x="44" y="20" width="6" height="6" fill="#555" rx="1"/>
    <rect x="64" y="20" width="6" height="6" fill="#666" rx="1"/>
    <rect x="44" y="30" width="6" height="6" fill="#666" rx="1"/>
    <rect x="54" y="30" width="6" height="6" fill="#555" rx="1"/>

    <rect x="10" y="44" width="6" height="6" fill="#555" rx="1"/>
    <rect x="20" y="44" width="6" height="6" fill="#666" rx="1"/>
    <rect x="30" y="44" width="6" height="6" fill="#555" rx="1"/>
    <rect x="44" y="44" width="6" height="6" fill="#808080" rx="1"/>
    <rect x="54" y="44" width="6" height="6" fill="#666" rx="1"/>
    <rect x="64" y="44" width="6" height="6" fill="#555" rx="1"/>
    <rect x="74" y="44" width="6" height="6" fill="#666" rx="1"/>
    <rect x="84" y="44" width="6" height="6" fill="#555" rx="1"/>
    <rect x="94" y="44" width="6" height="6" fill="#666" rx="1"/>

    <rect x="10" y="54" width="6" height="6" fill="#666" rx="1"/>
    <rect x="30" y="54" width="6" height="6" fill="#555" rx="1"/>
    <rect x="44" y="54" width="6" height="6" fill="#666" rx="1"/>
    <rect x="64" y="54" width="6" height="6" fill="#808080" rx="1"/>
    <rect x="84" y="54" width="6" height="6" fill="#555" rx="1"/>

    <rect x="20" y="64" width="6" height="6" fill="#555" rx="1"/>
    <rect x="44" y="64" width="6" height="6" fill="#555" rx="1"/>
    <rect x="54" y="64" width="6" height="6" fill="#666" rx="1"/>
    <rect x="74" y="64" width="6" height="6" fill="#555" rx="1"/>
    <rect x="94" y="64" width="6" height="6" fill="#666" rx="1"/>

    <rect x="44" y="76" width="6" height="6" fill="#666" rx="1"/>
    <rect x="54" y="76" width="6" height="6" fill="#555" rx="1"/>
    <rect x="74" y="76" width="6" height="6" fill="#808080" rx="1"/>
    <rect x="84" y="76" width="6" height="6" fill="#666" rx="1"/>

    <rect x="44" y="86" width="6" height="6" fill="#555" rx="1"/>
    <rect x="64" y="86" width="6" height="6" fill="#666" rx="1"/>
    <rect x="94" y="86" width="6" height="6" fill="#555" rx="1"/>

    <rect x="44" y="96" width="6" height="6" fill="#666" rx="1"/>
    <rect x="54" y="96" width="6" height="6" fill="#808080" rx="1"/>
    <rect x="74" y="96" width="6" height="6" fill="#555" rx="1"/>
    <rect x="84" y="96" width="6" height="6" fill="#666" rx="1"/>
  </g>

  <!-- "SCAN ME" text below QR -->
  <text x="200" y="275" text-anchor="middle" font-family="monospace" font-size="10" fill="#555" letter-spacing="4">SCAN ME</text>

  <!-- inryokü small logo -->
  <text x="200" y="300" text-anchor="middle" font-family="monospace" font-size="7" fill="#333" letter-spacing="2">inryokü</text>

  <!-- Price tag -->
  <text x="200" y="450" text-anchor="middle" font-family="monospace" font-size="14" fill="#808080" font-weight="bold">¥1,400</text>
  <text x="200" y="468" text-anchor="middle" font-family="monospace" font-size="9" fill="#444">SPREAD THE SIGNAL</text>
</svg>